<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamagotchi</title>

<style>
body{
    background:#87CEEB;
    font-family:Arial, sans-serif;
    text-align:center;
    margin:0;
    padding:20px;
}

#game{
    max-width:500px;
    margin:auto;
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

#pet{
    font-size:100px;
    margin:20px 0;
    user-select:none;
}

.stat{
    margin:10px 0;
}

.bar{
    width:100%;
    height:25px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
}

.fill{
    height:100%;
    background:#4CAF50;
    width:100%;
    transition:0.3s;
}

button{
    padding:12px 20px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

.feed{
    background:#ffb347;
}

.play{
    background:#66ccff;
}

.sleep{
    background:#b19cd9;
}

#message{
    margin-top:15px;
    font-weight:bold;
    min-height:25px;
}

#age{
    font-size:20px;
    margin-bottom:10px;
}
</style>
</head>
<body>

<div id="game">
    <h1>🐣 Tamagotchi</h1>

    <div id="age">Age: 0 days</div>

    <div id="pet">🐣</div>

    <div class="stat">
        Hunger
        <div class="bar">
            <div id="hungerBar" class="fill"></div>
        </div>
    </div>

    <div class="stat">
        Happiness
        <div class="bar">
            <div id="happyBar" class="fill"></div>
        </div>
    </div>

    <div class="stat">
        Energy
        <div class="bar">
            <div id="energyBar" class="fill"></div>
        </div>
    </div>

    <button class="feed" onclick="feedPet()">🍎 Feed</button>
    <button class="play" onclick="playWithPet()">⚽ Play</button>
    <button class="sleep" onclick="sleepPet()">😴 Sleep</button>

    <div id="message"></div>
</div>

<script>
let pet = {
    hunger: 100,
    happiness: 100,
    energy: 100,
    age: 0,
    alive: true
};

function updateDisplay(){
    document.getElementById("hungerBar").style.width =
        pet.hunger + "%";

    document.getElementById("happyBar").style.width =
        pet.happiness + "%";

    document.getElementById("energyBar").style.width =
        pet.energy + "%";

    document.getElementById("age").textContent =
        "Age: " + pet.age + " days";

    const petEmoji =
        pet.age < 3 ? "🐣" :
        pet.age < 8 ? "🐥" :
        "🐤";

    document.getElementById("pet").textContent = petEmoji;
}

function showMessage(text){
    document.getElementById("message").textContent = text;
}

function feedPet(){
    if(!pet.alive) return;

    pet.hunger = Math.min(100, pet.hunger + 25);
    showMessage("Yum! Thanks for feeding me!");
    updateDisplay();
}

function playWithPet(){
    if(!pet.alive) return;

    pet.happiness = Math.min(100, pet.happiness + 20);
    pet.energy = Math.max(0, pet.energy - 10);

    showMessage("That was fun!");
    updateDisplay();
}

function sleepPet(){
    if(!pet.alive) return;

    pet.energy = Math.min(100, pet.energy + 30);
    showMessage("Zzz... feeling refreshed!");
    updateDisplay();
}

function gameOver(){
    pet.alive = false;

    document.getElementById("pet").textContent = "💀";

    showMessage("Your pet has passed away...");
}

function tick(){
    if(!pet.alive) return;

    pet.hunger -= Math.floor(Math.random()*4)+1;
    pet.happiness -= Math.floor(Math.random()*3)+1;
    pet.energy -= Math.floor(Math.random()*2)+1;

    pet.hunger = Math.max(0, pet.hunger);
    pet.happiness = Math.max(0, pet.happiness);
    pet.energy = Math.max(0, pet.energy);

    if(
        pet.hunger <= 0 ||
        pet.happiness <= 0 ||
        pet.energy <= 0
    ){
        gameOver();
        return;
    }

    updateDisplay();
}

function ageUp(){
    if(!pet.alive) return;

    pet.age++;
    updateDisplay();
}

updateDisplay();

setInterval(tick, 5000);
setInterval(ageUp, 20000);
</script>

</body>
</html>
